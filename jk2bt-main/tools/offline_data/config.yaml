# 离线数据预热配置文件

# ============================================================
# 股票池配置
# ============================================================
stock_pool:
  # 核心股票池 - 沪深300成分股
  core:
    source: "index"
    index_code: "000300.XSHG"
    description: "沪深300成分股"
    
  # 扩展股票池 - 中证500成分股
  extended:
    source: "index"
    index_code: "000905.XSHG"
    description: "中证500成分股"
    
  # 自定义股票池（默认使用）
  custom:
    - "600519.XSHG"   # 贵州茅台
    - "000858.XSHE"   # 五粮液
    - "000333.XSHE"   # 美的集团
    - "600036.XSHG"   # 招商银行
    - "601318.XSHG"   # 中国平安
    - "000001.XSHE"   # 平安银行
    - "601166.XSHG"   # 兴业银行
    - "600000.XSHG"   # 浦发银行

# 默认使用的股票池
default_pool: "custom"

# ============================================================
# 指数池配置
# ============================================================
index_pool:
  - "000300.XSHG"   # 沪深300
  - "000905.XSHG"   # 中证500
  - "000016.XSHG"   # 上证50

# ============================================================
# 时间范围配置
# ============================================================
date_range:
  static_start: "2020-01-01"
  quarterly_start: "2022-01-01"
  daily_start: "2023-01-01"
  end: ""

# ============================================================
# 缓存配置
# ============================================================
cache:
  duckdb_dir: "data"
  pickle_dir: "finance_cache"

# ============================================================
# 预热选项
# ============================================================
options:
  skip_existing: true
  retry_count: 3
  request_delay: 0.5
  show_progress: true
